name: Normalizar nombres de imágenes

# Cada vez que se suben imágenes, renombra las que tengan espacios,
# mayúsculas o acentos, para que sus links de jsDelivr funcionen en Tiendup.
on:
  push:
    branches: [main]
    paths:
      - 'lmti/lmti-cursos-img/**'
  workflow_dispatch:        # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  normalizar:
    # Evita re-disparar sobre el propio commit del bot.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Renombrar archivos con espacios, mayúsculas o acentos
        run: python3 .github/scripts/normalizar-nombres.py

      - name: Commitear y pushear si hubo cambios
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Normalizar nombres de imágenes (automático)"
            git push
          else
            echo "Nada que renombrar."
          fi
